name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      # Uncomment after setting PYPI_API_TOKEN secret
      # - name: Publish to PyPI
      #   env:
      #     TWINE_USERNAME: __token__
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: pip install twine && twine upload dist/*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate tarball sha256
        id: sha
        run: |
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          echo "url=${TARBALL_URL}" >> "$GITHUB_OUTPUT"
          SHA=$(curl -sL "${TARBALL_URL}" | sha256sum | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Tarball: ${TARBALL_URL}"
          echo "SHA256:  ${SHA}"

      - name: Clone homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-e3cli
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate formula with all transitive dependencies
        run: |
          python3 - "${{ github.repository }}" "${{ steps.sha.outputs.url }}" "${{ steps.sha.outputs.sha256 }}" << 'PYSCRIPT'
          import json, re, sys, urllib.request

          repo, tarball_url, tarball_sha = sys.argv[1], sys.argv[2], sys.argv[3]

          def get_info(pkg):
              pkg_normalized = re.sub(r'[-_.]+', '-', pkg).lower()
              try:
                  data = json.loads(urllib.request.urlopen(f"https://pypi.org/pypi/{pkg_normalized}/json").read())
              except Exception:
                  return None
              ver = data["info"]["version"]
              requires = data["info"].get("requires_dist") or []
              deps = []
              for r in requires:
                  if "extra ==" in r:
                      continue
                  # Extract package name (before any version specifier or marker)
                  m = re.match(r'^([A-Za-z0-9]([A-Za-z0-9._-]*[A-Za-z0-9])?)', r)
                  if m:
                      deps.append(m.group(1).lower())
              sdist_url, sha = "", ""
              for f in data["releases"].get(ver, []):
                  if f["packagetype"] == "sdist":
                      sdist_url, sha = f["url"], f["digests"]["sha256"]
                      break
              return {"name": pkg_normalized, "deps": deps, "url": sdist_url, "sha256": sha}

          # Resolve ALL transitive dependencies
          seen = set()
          queue = ["typer", "requests", "rich"]
          resources = []

          while queue:
              pkg = queue.pop(0)
              key = re.sub(r'[-_.]+', '_', pkg).lower()
              if key in seen:
                  continue
              seen.add(key)
              info = get_info(pkg)
              if info is None:
                  print(f"WARNING: Could not resolve {pkg}", file=sys.stderr)
                  continue
              if info["url"]:
                  resources.append(info)
              for d in info["deps"]:
                  dk = re.sub(r'[-_.]+', '_', d).lower()
                  if dk not in seen:
                      queue.append(d)

          # Build formula
          lines = [
              'class E3cli < Formula',
              '  include Language::Python::Virtualenv',
              '',
              '  desc "NYCU E3 Moodle automation CLI — sync courses, download materials, submit assignments"',
              f'  homepage "https://github.com/{repo}"',
              f'  url "{tarball_url}"',
              f'  sha256 "{tarball_sha}"',
              '  license "MIT"',
              '',
              '  depends_on "python@3.12"',
          ]

          for r in resources:
              lines += [
                  '',
                  f'  resource "{r["name"]}" do',
                  f'    url "{r["url"]}"',
                  f'    sha256 "{r["sha256"]}"',
                  '  end',
              ]

          lines += [
              '',
              '  def install',
              '    virtualenv_install_with_resources',
              '  end',
              '',
              '  test do',
              '    assert_match "e3cli", shell_output("#{bin}/e3cli version")',
              '  end',
              'end',
              '',
          ]

          formula = "\n".join(lines)
          with open("homebrew-tap/Formula/e3cli.rb", "w") as f:
              f.write(formula)

          print("=== Generated formula ===")
          print(formula)
          print(f"\nTotal resources: {len(resources)}", file=sys.stderr)
          PYSCRIPT

      - name: Push updated formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/e3cli.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update e3cli to ${{ github.ref_name }}"
          git push
